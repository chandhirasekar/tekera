             C 31.5,82.5 37.5,88.5 42.5,90.5
             C 44,91 45,89.5 43,88
             C 37.5,84 32.5,77 27.5,68
             C 23.5,60.5 22.5,50 23.5,41.5
             C 24.5,33 27.5,27.5 33.5,23.5
             C 35.5,22 34.5,20.5 32,21.5
             C 26.5,23.5 22.5,26.5 19.5,27.5 Z"
